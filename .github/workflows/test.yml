name: test project
on: push
jobs: 
  test :
    runs-on : ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Runs lint
        run: npm run lint
      - name: Runs test
        run: npm test
      - name: build project
        run: npm run build
      - name: deploy
        run: echo "deployin...."